<!DOCTYPE html>
<html>
<head>
<title>HotReload Logs</title>
<style>
body {
    font-family: monospace;
    background: #111;
    color: #0f0;
    padding: 20px;
}

#logs {
    white-space: pre-wrap;
    line-height: 1.6;
}
</style>
</head>

<body>

<h2>HotReload Log Dashboard</h2>

<div id="logs"></div>

<script>

const logBox = document.getElementById("logs");

const evtSource = new EventSource("/logs");

evtSource.onmessage = function(event) {

    logBox.textContent += event.data + "\n";

    // auto scroll
    window.scrollTo(0, document.body.scrollHeight);
};

</script>

</body>
</html>
